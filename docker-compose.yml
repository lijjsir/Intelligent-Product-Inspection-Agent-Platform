services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: piap-backend
    working_dir: /app/backend
    command: >
      sh -c "PYTHONPATH=. alembic upgrade head &&
      python -m uvicorn main:app --host 0.0.0.0 --port 8000 --reload"
    environment:
      PYTHONPATH: /app/backend
      PIAP_DB_URL: mysql+aiomysql://piap:piap@mysql:3306/piap_main
      PIAP_DB_REPLICA_URL: mysql+aiomysql://piap:piap@mysql:3306/piap_main
      PIAP_REDIS_URL: redis://redis:6379/0
      PIAP_CELERY_BROKER_URL: redis://redis:6379/0
      PIAP_CELERY_RESULT_BACKEND: redis://redis:6379/0
      PIAP_S3_ENDPOINT: http://minio:9000
      PIAP_QDRANT_URL: http://qdrant:6333
      PIAP_LOCAL_OPENAI_BASE_URL: http://127.0.0.1:11434/v1
      PIAP_LOCAL_OPENAI_DOCKER_BASE_URL: http://host.docker.internal:11434/v1
      PIAP_LANGFUSE_HOST: http://langfuse-web:3000
      PIAP_LANGFUSE_PUBLIC_HOST: http://127.0.0.1:3000
      PIAP_LANGFUSE_ENABLED: "true"
      PIAP_LANGFUSE_PUBLIC_KEY: ${PIAP_LANGFUSE_PUBLIC_KEY:-}
      PIAP_LANGFUSE_SECRET_KEY: ${PIAP_LANGFUSE_SECRET_KEY:-}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
      qdrant:
        condition: service_started
    ports:
      - "127.0.0.1:${PIAP_BACKEND_HOST_PORT:-8000}:8000"
    volumes:
      - ./backend:/app/backend

  celery-worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: piap-celery-worker
    working_dir: /app/backend
    command: python -m celery -A worker.celery_app.celery_app worker -l info
    environment:
      PYTHONPATH: /app/backend
      PIAP_DB_URL: mysql+aiomysql://piap:piap@mysql:3306/piap_main
      PIAP_DB_REPLICA_URL: mysql+aiomysql://piap:piap@mysql:3306/piap_main
      PIAP_REDIS_URL: redis://redis:6379/0
      PIAP_CELERY_BROKER_URL: redis://redis:6379/0
      PIAP_CELERY_RESULT_BACKEND: redis://redis:6379/0
      PIAP_S3_ENDPOINT: http://minio:9000
      PIAP_QDRANT_URL: http://qdrant:6333
      PIAP_LOCAL_OPENAI_BASE_URL: http://127.0.0.1:11434/v1
      PIAP_LOCAL_OPENAI_DOCKER_BASE_URL: http://host.docker.internal:11434/v1
      PIAP_LANGFUSE_HOST: http://langfuse-web:3000
      PIAP_LANGFUSE_PUBLIC_HOST: http://127.0.0.1:3000
      PIAP_LANGFUSE_ENABLED: "true"
      PIAP_LANGFUSE_PUBLIC_KEY: ${PIAP_LANGFUSE_PUBLIC_KEY:-}
      PIAP_LANGFUSE_SECRET_KEY: ${PIAP_LANGFUSE_SECRET_KEY:-}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
      qdrant:
        condition: service_started
    volumes:
      - ./backend:/app/backend

  mysql:
    image: mysql:8.0
    container_name: piap-mysql
    command: ["--default-authentication-plugin=mysql_native_password"]
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: piap_main
      MYSQL_USER: piap
      MYSQL_PASSWORD: piap
    ports:
      - "127.0.0.1:13306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  redis:
    image: redis:7
    container_name: piap-redis
    ports:
      - "127.0.0.1:16379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management
    container_name: piap-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: piap
      RABBITMQ_DEFAULT_PASS: piap
      RABBITMQ_DEFAULT_VHOST: piap
    ports:
      - "15673:5672"
      - "15672:15672"

  minio:
    image: minio/minio:latest
    container_name: piap-minio
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: piap
      MINIO_ROOT_PASSWORD: piap_password
    ports:
      - "19000:9000"
      - "19001:9001"
    volumes:
      - minio_data:/data

  qdrant:
    image: qdrant/qdrant:latest
    container_name: piap-qdrant
    ports:
      - "16333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  mysql_data:
  minio_data:
  qdrant_data:
