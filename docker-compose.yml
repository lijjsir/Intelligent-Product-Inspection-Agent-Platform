services:
  mysql:
    image: mysql:8.0
    container_name: piap-mysql
    command: ["--default-authentication-plugin=mysql_native_password"]
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: piap_main
      MYSQL_USER: piap
      MYSQL_PASSWORD: piap
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7
    container_name: piap-redis
    ports:
      - "127.0.0.1:16379:6379"

  rabbitmq:
    image: rabbitmq:3-management
    container_name: piap-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: piap
      RABBITMQ_DEFAULT_PASS: piap
      RABBITMQ_DEFAULT_VHOST: piap
    ports:
      - "15673:5672"
      - "15672:15672"

  minio:
    image: minio/minio:latest
    container_name: piap-minio
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: piap
      MINIO_ROOT_PASSWORD: piap_password
    ports:
      - "19000:9000"
      - "19001:9001"
    volumes:
      - minio_data:/data

  qdrant:
    image: qdrant/qdrant:latest
    container_name: piap-qdrant
    ports:
      - "16333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  mysql_data:
  minio_data:
  qdrant_data:
